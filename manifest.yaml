display_information:
  name: 共有「後で」
features:
  bot_user:
    display_name: 共有「後で」
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
  shortcuts:
    - name: 後でに追加
      type: global
      callback_id: add_task_global
      description: 共有リストにタスクを追加
    - name: 共有リストに保存
      type: message
      callback_id: save_message_to_list
      description: このメッセージを共有「後で」に保存
  slash_commands:
    - command: /later
      description: 共有「後で」に追加（引数なしで入力モーダル）
      usage_hint: "[タスク内容]"
      should_escape: true
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - channels:read
      - groups:read
      - im:read
      - mpim:read
settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
